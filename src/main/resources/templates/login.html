<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Bilabonnement-login</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div class="split-layout">

    <div class="split-left">
        <h1>Velkommen.</h1>
        <p>Log ind for at få adgang til dit dashboard</p>
        <img th:src="@{/logo-illustration-text.svg}" style="width: 40%; opacity: 0.8; margin-top: 4rem;">
    </div>

    <div class="split-right">

        <div class="form-box">
            <img th:src="@{/logo.png}" alt="Bilabonnement logo" style="width: 250px; margin-bottom: 2.5rem; display: block;">
            <h2>Log ind</h2>

            <div class="alert-danger" th:if="${loginError}">
                Indtastet username eller password er forkert.
            </div>

            <div class="alert-success" th:if="${param.registered}">
                Bruger oprettet. Log ind med dine nye oplysninger.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Brugernavn</label>
                    <input type="text" name="username" placeholder="Indtast brugernavn">
                </div>

                <div class="form-group">
                    <label>Adgangskode</label>
                    <input type="password" name="password" placeholder="Indtast adgangskode">
                </div>

                <div class="form-group">
                    <button class="btn btn-primary" type="submit">Log ind</button>
                </div>
            </form>

            <div style="text-align: center; margin-top: 1rem;">
                <a th:href="@{/register-user}">Opret ny bruger</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
