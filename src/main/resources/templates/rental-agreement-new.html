<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ny Lejeaftale</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div class="app-layout">

    <div class="sidebar">
        <div class="sidebar-brand">Bil<span>abonnement</span></div>
        <nav>
            <a th:href="@{/}">Dashboard</a>
            <a th:href="@{/car-registration-overview}">Bilregistrering</a>
            <a th:href="@{/rental/new}" class="active">Ny Lejeaftale</a>
            <a th:href="@{/damage}">Skaderapport</a>
        </nav>
        <div class="sidebar-footer">
            <a th:href="@{/logout}">Log ud</a>
        </div>
    </div>

    <div class="main-content">

        <div class="topbar">
            <span class="page-title">Ny lejeaftale</span>
            <span class="topbar-user">Dataregistrering</span>
        </div>

        <div class="page-content">

            <div class="alert-danger" th:if="${error}">
                <span th:text="${error}"></span>
            </div>

            <div class="alert-success" th:if="${successMessage}">
                <span th:text="${successMessage}"></span>
            </div>

            <form th:action="@{/rental/R-A-new}" th:object="${rentalAgreement}" method="post"
                  style="background:white; border-radius:12px; padding:2rem; max-width:600px;">

                <div class="form-group">
                    <label>Vælg bil</label>
                    <select th:field="*{carId}" required>
                        <option value="">— Vælg bil —</option>
                        <option th:each="car : ${availableCars}"
                                th:value="${car.carId}"
                                th:text="${car.maker + ' ' + car.model + ' – ' + car.stelnumber}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Startdato</label>
                    <input type="date" th:field="*{startDate}" required/>
                </div>

                <div class="form-group">
                    <label>Slutdato</label>
                    <input type="date" th:field="*{endDate}" required/>
                </div>

                <div class="form-group">
                    <label>Abonnementstype</label>
                    <select th:field="*{subscriptionType}" required>
                        <option value="">— Vælg type —</option>
                        <option value="LIMITED">Limited (5 måneder)</option>
                        <option value="UNLIMITED">Unlimited (3–36 måneder)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Afhentningssted</label>
                    <select th:field="*{location}" required>
                        <option value="">— Vælg sted —</option>
                        <option value="HQ">Bilabonnement</option>
                        <option value="DS_DEALER">DS Salon</option>
                    </select>
                </div>

                <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                    <a th:href="@{/}" class="btn btn-secondary">Annuller</a>
                    <button type="submit" class="btn btn-primary" style="width:auto;">Gem lejeaftale</button>
                </div>

            </form>
        </div>
    </div>
</div>
</body>
</html>
