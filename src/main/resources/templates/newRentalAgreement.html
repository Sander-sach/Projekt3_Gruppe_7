<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ny lejeaftale</title>
</head>
<body>
<h1>Opret ny lejeaftale</h1>

<!-- Fejlbesked hvis oprettelse mislykkedes -->
<p th:if="${error}" style="color:red;">
    Lejeaftalen kunne ikke oprettes. Tjek at bilen ikke allerede er udlejet,
    og at alle felter er udfyldt korrekt.
</p>

<!-- th:object binder formularen til RentalAgreement-objektet fra controlleren -->
<form th:action="@{/rentalagreement/new}" th:object="${rentalAgreement}" method="post">

    <label>Kundenavn:</label>
    <input type="text" th:field="*{customerName}" /><br/>

    <label>Kunde e-mail:</label>
    <input type="email" th:field="*{customerEmail}" /><br/>

    <label>Stelnummer (bil):</label>
    <input type="text" th:field="*{chassisNumber}" /><br/>

    <label>Startdato:</label>
    <input type="date" th:field="*{startDate}" /><br/>

    <label>Slutdato:</label>
    <input type="date" th:field="*{endDate}" /><br/>

    <label>Månedlig pris (kr):</label>
    <input type="number" step="0.01" th:field="*{monthlyPrice}" /><br/>

    <label>Afhentningssted:</label>
    <input type="text" th:field="*{pickupLocation}" /><br/>

    <button type="submit">Opret lejeaftale</button>
</form>
</body>
</html>
