<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <title>Bilabonnement — Ny Lejeaftale</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>

<div class="app-layout">

    <div class="sidebar">
        <div class="sidebar-brand">BIL<span>ABONNEMENT</span></div>
        <nav>
            <a th:href="@{/data-registration}">Dashboard</a>
            <a th:href="@{/car-registration-overview}">Bil Registrering</a>
            <a th:href="@{/rental/new}" class="active">Ny Lejeaftale</a>
        </nav>
        <div class="sidebar-footer">
            <span th:text="${session.employee.name}">Navn</span><br>
            <a th:href="@{/logout}">Log ud</a>
        </div>
    </div>

    <div class="main-content">

        <div class="topbar">
            <span class="page-title">Ny Lejeaftale</span>
            <span class="topbar-user">
                Logget ind som: <strong th:text="${session.employee.name}">Navn</strong>
            </span>
        </div>

        <div class="page-content">

            <!-- Fejlbesked -->
            <div th:if="${error}" class="alert-danger" th:text="${error}"></div>

            <div style="background: white; border-radius: 12px; padding: 2rem; max-width: 600px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">

                <form th:action="@{/rental/R-A-new}" th:object="${rentalAgreement}" method="post">

                    <div class="form-group">
                        <label>Bil</label>
                        <select th:field="*{carId}">
                            <option value="">-- Vælg bil --</option>
                            <option th:each="car : ${availableCars}"
                                    th:value="${car.carId}"
                                    th:text="${car.maker + ' ' + car.model + ' (' + car.stelnumber + ')'}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Startdato</label>
                        <input type="date" th:field="*{startDate}" required/>
                    </div>

                    <div class="form-group">
                        <label>Slutdato</label>
                        <input type="date" th:field="*{endDate}" required/>
                    </div>

                    <div class="form-group">
                        <label>Abonnementstype</label>
                        <select th:field="*{subscriptionType}">
                            <option value="UNLIMITED">Unlimited</option>
                            <option value="LIMITED">Limited</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Leveringssted</label>
                        <select th:field="*{location}">
                            <option value="HQ">HQ</option>
                            <option value="DS_DEALER">DS Dealer</option>
                        </select>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                        <button type="submit" class="btn btn-primary" style="width: auto;">Gem lejeaftale</button>
                        <a th:href="@{/data-registration}" class="btn btn-secondary">Annuller</a>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

</body>
</html>
